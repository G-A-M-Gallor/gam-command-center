name: Sync CLAUDE.md → vb_ai_memory

on:
  push:
    branches: [main]
    paths: ["CLAUDE.md"]
  workflow_dispatch: # הפעלה ידנית מ-GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Send CLAUDE.md to Supabase Edge Function
        run: |
          CONTENT=$(cat CLAUDE.md | jq -Rs .)
          curl -s -X POST \
            "https://qdnreijwcptghwoaqlny.supabase.co/functions/v1/sync-claude-md" \
            -H "Content-Type: application/json" \
            -H "x-webhook-secret: ${{ secrets.SYNC_WEBHOOK_SECRET }}" \
            -d "{\"content\": $CONTENT}" | tee result.json
          
          # בדיקה שהסתיים בהצלחה
          if [ "$(cat result.json | jq -r '.ok')" != "true" ]; then
            echo "❌ Sync failed:"
            cat result.json | jq .
            exit 1
          fi
          
          echo "✅ Sync complete:"
          cat result.json | jq .
