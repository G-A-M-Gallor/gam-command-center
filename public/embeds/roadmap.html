<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAM Roadmap Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#1e293b}
::-webkit-scrollbar-thumb{background:#475569;border-radius:3px}

/* Layer Colors */
:root{--goal:#3b82f6;--type:#8b5cf6;--task:#f59e0b;--done:#10b981;--blocked:#ef4444}

/* Status Badges */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:9999px;text-transform:uppercase;letter-spacing:.3px}
.badge-backlog{background:#334155;color:#94a3b8}
.badge-in-progress{background:#1e3a5f;color:#60a5fa}
.badge-done{background:#14532d;color:#4ade80}
.badge-blocked{background:#450a0a;color:#f87171}
.badge-planned{background:#334155;color:#94a3b8}

/* Loading */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px;color:#64748b}
#loading .spinner{width:36px;height:36px;border:3px solid #334155;border-top-color:#3b82f6;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Error */
#error{display:none;text-align:center;padding:40px;color:#f87171}

/* Breadcrumb */
#breadcrumb{padding:12px 20px;background:#1e293b;border-bottom:1px solid #334155;font-size:13px;color:#64748b;display:flex;align-items:center;gap:6px;flex-wrap:wrap;direction:ltr}
#breadcrumb span{cursor:pointer;transition:color .15s}
#breadcrumb span:hover{color:#e2e8f0}
#breadcrumb .sep{color:#475569;cursor:default}
#breadcrumb .active{color:#e2e8f0;font-weight:600}

/* Stats Strip */
#stats-strip{display:flex;gap:6px;padding:10px 20px;background:#1e293b60;border-bottom:1px solid #334155;overflow-x:auto;direction:ltr}
.stat-chip{display:flex;align-items:center;gap:6px;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:6px 12px;font-size:12px;white-space:nowrap}
.stat-chip .stat-val{font-weight:700;color:#e2e8f0}
.stat-chip .stat-lbl{color:#64748b}

/* Zone 1: Goals Bar */
#goals-bar{display:flex;gap:8px;padding:16px 20px;overflow-x:auto;background:#1e293b80;border-bottom:1px solid #334155}
.goal-card{min-width:150px;flex:1;padding:14px;border-radius:12px;background:#1e293b;border:2px solid #334155;cursor:pointer;transition:all .2s}
.goal-card:hover{border-color:var(--goal);transform:translateY(-2px);box-shadow:0 4px 20px #3b82f620}
.goal-card.selected{border-color:var(--goal);background:#1e293bee;box-shadow:0 0 0 1px var(--goal),0 4px 20px #3b82f630}
.goal-card .icon{font-size:20px;margin-bottom:6px}
.goal-card .name{font-size:12px;font-weight:600;color:#e2e8f0;margin-bottom:8px;line-height:1.3}
.goal-card .progress-bar{height:6px;background:#334155;border-radius:3px;overflow:hidden;margin-bottom:6px}
.goal-card .progress-fill{height:100%;border-radius:3px;background:var(--goal);transition:width .5s ease}
.goal-card .meta{display:flex;justify-content:space-between;align-items:center}
.goal-card .pct{font-size:11px;font-weight:700;color:var(--goal)}

/* Zone 2: Type Groups */
#tree-zone{padding:20px;min-height:200px;direction:ltr}
.type-group{margin-bottom:16px}
.type-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#8b5cf615;border:1px solid #8b5cf640;border-radius:10px;cursor:pointer;transition:all .15s;margin-bottom:8px}
.type-header:hover{background:#8b5cf625;border-color:#8b5cf660}
.type-header .type-name{font-size:14px;font-weight:600;color:#c4b5fd;flex:1}
.type-header .type-count{font-size:11px;color:#a78bfa}
.type-header .type-pct{font-size:12px;font-weight:700;color:#a78bfa;min-width:36px;text-align:right}
.type-header .type-progress{flex:0 0 100px;height:4px;background:#ffffff15;border-radius:2px;overflow:hidden}
.type-header .type-progress-fill{height:100%;border-radius:2px;background:var(--type);transition:width .5s}
.type-header .expand-arrow{color:#8b5cf6;font-size:12px;transition:transform .2s;width:16px;text-align:center}
.type-header .expand-arrow.open{transform:rotate(90deg)}

/* Task Items inside type groups */
.type-tasks{display:none;padding:0 0 0 20px}
.type-tasks.open{display:block}

.task-item{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:6px;transition:all .15s;overflow:hidden}
.task-item:hover{border-color:#475569}
.task-row{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;direction:ltr}
.task-row .task-color{width:4px;height:28px;border-radius:2px;flex-shrink:0}
.task-row .task-color.c-done{background:var(--done)}
.task-row .task-color.c-in-progress{background:#3b82f6}
.task-row .task-color.c-backlog{background:#64748b}
.task-row .task-color.c-blocked{background:var(--blocked)}
.task-row .task-name{flex:1;font-size:13px;font-weight:500}
.task-row .task-priority{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
.task-row .task-priority.p0{background:#7f1d1d;color:#fca5a5}
.task-row .task-priority.p1{background:#78350f;color:#fcd34d}
.task-row .task-priority.p2{background:#1e3a5f;color:#93c5fd}
.task-row .task-priority.p3{background:#334155;color:#94a3b8}
.task-row .task-effort{font-size:10px;color:#64748b;min-width:40px}
.task-row .task-owner{font-size:10px;color:#64748b;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-row .task-link{color:#64748b;text-decoration:none;font-size:14px;transition:color .15s}
.task-row .task-link:hover{color:#3b82f6}

/* Empty State */
.empty-state{text-align:center;padding:40px 20px;color:#475569;font-size:13px}
.empty-state .empty-icon{font-size:36px;margin-bottom:8px}

/* Refresh */
#refresh-btn{position:fixed;bottom:16px;right:16px;background:#1e293b;border:1px solid #334155;color:#64748b;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:12px;transition:all .15s;z-index:50}
#refresh-btn:hover{background:#334155;color:#e2e8f0}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span>Loading from Notion...</span>
</div>

<div id="error"></div>

<div id="app" style="display:none">
  <div id="breadcrumb"></div>
  <div id="stats-strip"></div>
  <div id="goals-bar"></div>
  <div id="tree-zone"></div>
</div>

<button id="refresh-btn" onclick="fetchAndRender()">⟳ Refresh</button>

<script>
// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════

let roadmapData = null;
const state = { goalId: null };

function loadStateFromURL() {
  const p = new URLSearchParams(window.location.search);
  state.goalId = p.get('goal') ? +p.get('goal') : null;
}

function saveStateToURL() {
  const p = new URLSearchParams();
  if (state.goalId) p.set('goal', state.goalId);
  const qs = p.toString();
  const url = window.location.pathname + (qs ? '?' + qs : '');
  window.history.replaceState(null, '', url);
}

// ═══════════════════════════════════════════════════════
// FETCH DATA
// ═══════════════════════════════════════════════════════

async function fetchAndRender() {
  const loadingEl = document.getElementById('loading');
  const errorEl = document.getElementById('error');
  const appEl = document.getElementById('app');

  loadingEl.style.display = 'flex';
  errorEl.style.display = 'none';
  appEl.style.display = 'none';

  try {
    // Resolve API URL relative to embed origin
    const base = window.location.origin;
    const res = await fetch(base + '/api/roadmap/data');
    if (!res.ok) throw new Error('API returned ' + res.status);
    roadmapData = await res.json();
    if (roadmapData.error) throw new Error(roadmapData.error);

    loadingEl.style.display = 'none';
    appEl.style.display = 'block';
    renderAll();
  } catch (err) {
    loadingEl.style.display = 'none';
    errorEl.style.display = 'block';
    errorEl.innerHTML = '<div style="font-size:24px;margin-bottom:8px">⚠️</div>' +
      '<div>Failed to load roadmap data</div>' +
      '<div style="font-size:11px;margin-top:6px;color:#64748b">' + err.message + '</div>' +
      '<button onclick="fetchAndRender()" style="margin-top:12px;background:#334155;border:1px solid #475569;color:#e2e8f0;padding:6px 16px;border-radius:6px;cursor:pointer">Retry</button>';
  }
}

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════

function statusLabel(s) {
  const map = { 'backlog': 'Backlog', 'in-progress': 'In Progress', 'done': 'Done', 'blocked': 'Blocked', 'planned': 'Planned' };
  return map[s] || s;
}

function priorityClass(p) {
  if (!p) return '';
  if (p.includes('P0')) return 'p0';
  if (p.includes('P1')) return 'p1';
  if (p.includes('P2')) return 'p2';
  return 'p3';
}

// ═══════════════════════════════════════════════════════
// RENDER — Stats Strip
// ═══════════════════════════════════════════════════════

function renderStats() {
  const el = document.getElementById('stats-strip');
  if (!roadmapData) return;

  const d = roadmapData;
  const overallPct = d.totalTasks > 0 ? Math.round((d.doneCount / d.totalTasks) * 100) : 0;

  el.innerHTML = [
    chip('📋', d.totalTasks, 'Tasks'),
    chip('✅', d.doneCount, 'Done'),
    chip('🔄', d.inProgressCount, 'In Progress'),
    chip('📊', overallPct + '%', 'Progress'),
    chip('🎯', d.goals.length, 'Goals'),
  ].join('');
}

function chip(icon, val, label) {
  return `<div class="stat-chip"><span>${icon}</span><span class="stat-val">${val}</span><span class="stat-lbl">${label}</span></div>`;
}

// ═══════════════════════════════════════════════════════
// RENDER — Breadcrumb
// ═══════════════════════════════════════════════════════

function renderBreadcrumb() {
  const el = document.getElementById('breadcrumb');
  const parts = [{ label: 'GAM Roadmap', action: () => { state.goalId = null; renderAll(); } }];

  if (state.goalId && roadmapData) {
    const goal = roadmapData.goals.find(g => g.id === state.goalId);
    if (goal) parts.push({ label: goal.icon + ' ' + goal.name, action: null });
  }

  el.innerHTML = '';
  parts.forEach((p, i) => {
    if (i > 0) {
      const sep = document.createElement('span');
      sep.className = 'sep';
      sep.textContent = '›';
      el.appendChild(sep);
    }
    const span = document.createElement('span');
    span.textContent = p.label;
    if (i === parts.length - 1) span.className = 'active';
    if (p.action) span.addEventListener('click', p.action);
    el.appendChild(span);
  });
}

// ═══════════════════════════════════════════════════════
// RENDER — Goals Bar
// ═══════════════════════════════════════════════════════

function renderGoals() {
  const bar = document.getElementById('goals-bar');
  if (!roadmapData) return;
  bar.innerHTML = '';

  roadmapData.goals.forEach(goal => {
    const card = document.createElement('div');
    card.className = 'goal-card' + (state.goalId === goal.id ? ' selected' : '');

    const totalTasks = goal.types.reduce((a, t) => a + t.tasks.length, 0);
    const doneTasks = goal.types.reduce((a, t) => a + t.tasks.filter(tk => tk._pct === 100).length, 0);

    card.innerHTML = `
      <div class="icon">${goal.icon}</div>
      <div class="name">${goal.name}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${goal._pct}%"></div></div>
      <div class="meta">
        <span class="pct">${goal._pct}%</span>
        <span class="badge badge-${goal.status}">${doneTasks}/${totalTasks}</span>
      </div>
    `;

    card.addEventListener('click', () => {
      state.goalId = state.goalId === goal.id ? null : goal.id;
      renderAll();
    });

    bar.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════════
// RENDER — Tree Zone (Type Groups → Tasks)
// ═══════════════════════════════════════════════════════

function renderTree() {
  const zone = document.getElementById('tree-zone');
  if (!roadmapData) return;
  zone.innerHTML = '';

  if (!state.goalId) {
    zone.innerHTML = '<div class="empty-state fade-in"><div class="empty-icon">🎯</div>Select a goal above to see its tasks</div>';
    return;
  }

  const goal = roadmapData.goals.find(g => g.id === state.goalId);
  if (!goal) return;

  if (goal.types.length === 0) {
    zone.innerHTML = '<div class="empty-state fade-in"><div class="empty-icon">📂</div>No tasks in this goal</div>';
    return;
  }

  goal.types.forEach((type, tIdx) => {
    const group = document.createElement('div');
    group.className = 'type-group fade-in';

    const doneCount = type.tasks.filter(t => t._pct === 100).length;

    // Type header
    const header = document.createElement('div');
    header.className = 'type-header';
    header.innerHTML = `
      <span class="expand-arrow">▶</span>
      <span class="type-name">${type.name}</span>
      <span class="type-count">${doneCount}/${type.tasks.length}</span>
      <div class="type-progress"><div class="type-progress-fill" style="width:${type._pct}%"></div></div>
      <span class="type-pct">${type._pct}%</span>
    `;

    // Task list
    const taskList = document.createElement('div');
    taskList.className = 'type-tasks';

    type.tasks.forEach(task => {
      const item = document.createElement('div');
      item.className = 'task-item';

      const pClass = priorityClass(task.priority);

      item.innerHTML = `
        <div class="task-row">
          <div class="task-color c-${task.status}"></div>
          <div class="task-name">${task.name}</div>
          ${task.priority ? `<span class="task-priority ${pClass}">${task.priority}</span>` : ''}
          ${task.effort ? `<span class="task-effort">${task.effort}</span>` : ''}
          ${task.owner ? `<span class="task-owner">${task.owner}</span>` : ''}
          <span class="badge badge-${task.status}">${statusLabel(task.status)}</span>
          ${task.url ? `<a href="${task.url}" target="_blank" class="task-link" title="Open in Notion">↗</a>` : ''}
        </div>
      `;

      taskList.appendChild(item);
    });

    // Toggle expand
    header.addEventListener('click', () => {
      const arrow = header.querySelector('.expand-arrow');
      const isOpen = taskList.classList.contains('open');
      taskList.classList.toggle('open');
      arrow.classList.toggle('open');
    });

    // Auto-expand first type or if few types
    if (tIdx === 0 || goal.types.length <= 3) {
      taskList.classList.add('open');
      header.querySelector('.expand-arrow').classList.add('open');
    }

    group.appendChild(header);
    group.appendChild(taskList);
    zone.appendChild(group);
  });
}

// ═══════════════════════════════════════════════════════
// RENDER ALL
// ═══════════════════════════════════════════════════════

function renderAll() {
  saveStateToURL();
  renderBreadcrumb();
  renderStats();
  renderGoals();
  renderTree();
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════

loadStateFromURL();
fetchAndRender();

window.addEventListener('popstate', () => {
  loadStateFromURL();
  if (roadmapData) renderAll();
});
</script>
</body>
</html>
